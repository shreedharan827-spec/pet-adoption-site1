services:
  - type: web
    name: pet-adoption-backend
    env: static
    plan: free
    buildCommand: cd backend && mvn clean package -DskipTests
    startCommand: java -jar backend/target/paws-adopt-backend-1.0.0.jar
    envVars:
      - key: JAVA_OPTS
        value: -Xmx512m
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: pet-adoption-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: pet-adoption-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: pet-adoption-db
          property: password
      - key: JWT_SECRET
        value: your_super_secret_key_change_this_in_production_environment_12345

  - type: static
    name: pet-adoption-frontend
    plan: free
    staticPublishPath: ./frontend
    envVars:
      - key: API_BASE_URL
        value: https://pet-adoption-backend.onrender.com/api

databases:
  - name: pet-adoption-db
    plan: free
    databaseName: pet_adoption_site
    user: petuser
    startCommand: java -jar backend/target/paws-adopt-backend-1.0.0.jar
    envVars:
      - key: JAVA_OPTS
        value: -Xmx512m
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: pet-adoption-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: pet-adoption-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: pet-adoption-db
          property: password
      - key: JWT_SECRET
        value: your_super_secret_key_change_this_in_production_environment_12345

  - type: static
    name: pet-adoption-frontend
    plan: free
    staticPublishPath: ./frontend
    envVars:
      - key: API_BASE_URL
        value: https://pet-adoption-backend.onrender.com/api

