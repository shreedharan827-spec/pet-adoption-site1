# Production Configuration
spring.application.name=paws-adopt-api
spring.profiles.active=prod

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/api

# MySQL Database Configuration (Production)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/pet_adoption_prod?useSSL=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:pet_user}
spring.datasource.password=${DB_PASSWORD:change_this_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration
jwt.secret=${JWT_SECRET:your_super_secret_key_change_this_in_production_environment_12345}
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.petadoption=WARN

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Security
spring.security.user.name=${ADMIN_USERNAME:admin}
spring.security.user.password=${ADMIN_PASSWORD:change_this_password}