# Production Configuration
spring.application.name=paws-adopt-api

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/api

# PostgreSQL Database Configuration (Production)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration
jwt.secret=${JWT_SECRET:your_super_secret_key_change_this_in_production_environment_12345}
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.petadoption=WARN

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Security
spring.security.user.name=${ADMIN_USERNAME:admin}
spring.security.user.password=${ADMIN_PASSWORD:change_this_password}

# Twilio SMS Configuration
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.phone-number=${TWILIO_PHONE_NUMBER:}